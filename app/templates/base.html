<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IP Geolocation Service{% endblock %}</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/styles.css') }}">
    <script defer src="{{ request.url_for('static', path='js/app.js') }}"></script>
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <nav class="nav-bar">
                <a class="brand" href="/">GeoTrace</a>
                <div class="nav-links">
                    {% if current_user %}
                        <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                        <a href="/result" class="nav-link {% if request.url.path == '/result' %}active{% endif %}">Result</a>
                        <span class="nav-user">{{ current_user.username }}</span>
                        <form method="post" action="/logout" class="inline-form">
                            <button type="submit" class="nav-button">Logout</button>
                        </form>
                    {% else %}
                        <a href="/login" class="nav-link {% if request.url.path == '/login' %}active{% endif %}">Login</a>
                        <a href="/register" class="nav-link {% if request.url.path == '/register' %}active{% endif %}">Register</a>
                    {% endif %}
                </div>
            </nav>
        </header>

        <main class="page-content">
            {% if flash_messages %}
                <section class="flash-stack" aria-live="polite">
                    {% for flash in flash_messages %}
                        <article class="flash flash-{{ flash.category }}">
                            <div>
                                <strong>{{ flash.category|capitalize }}</strong>
                                <p>{{ flash.message }}</p>
                            </div>
                            <button type="button" class="flash-dismiss" data-dismiss-flash aria-label="Dismiss message">×</button>
                        </article>
                    {% endfor %}
                </section>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
