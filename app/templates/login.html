{% extends "base.html" %}

{% block title %}Login | GeoTrace{% endblock %}

{% block content %}
<section class="auth-shell">
    <article class="auth-card">
        <span class="eyebrow">Welcome Back</span>
        <h1>Sign in to continue</h1>
        <p>Use your account to access the protected IP geolocation dashboard.</p>

        <form method="post" action="/login" class="auth-form">
            <label for="username">Username</label>
            <input
                id="username"
                name="username"
                type="text"
                value="{{ form_data.username if form_data else '' }}"
                autocomplete="username"
                required
            >

            <label for="password">Password</label>
            <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
            >

            <button type="submit" class="primary-button">Login</button>
        </form>

        <p class="auth-footer">No account yet? <a href="/register">Create one</a>.</p>
    </article>
</section>
{% endblock %}
